<!DOCTYPE html>

<html>
  <head>
    <title>Student Management System</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f5f9;
        margin: 0;
      }
      /* Header */
      .header {
        background: #d9dee3;
        padding: 20px;
        text-align: center;
      }
      .header h1 {
        margin: 0;
        color: #2c3e50;
      }
      /* Welcome text */
      .welcome {
        text-align: center;
        margin-top: 20px;
      }
      /* Form container */
      .form-container {
        width: 400px;
        background: white;
        margin: 30px auto;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      /* Labels */
      label {
        font-weight: bold;
      }
      /* Inputs */
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      /* Button */
      button {
        width: 100%;
        padding: 10px;
        background: #3b8ec2;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #2f79a6;
      }
      /* Link section */
      .search-link {
        text-align: center;
        margin-top: 15px;
      }
      .search-link a {
        text-decoration: none;
        color: #3b8ec2;
        font-weight: bold;
      }
      .search-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Student Management System</h1>
    </div>

    <div class="welcome">
      <h2>Welcome {{ name }}</h2>
    </div>

    <div class="form-container">
      <form action="/studentinfo/create/">
        <label>Name</label> <input type="text" name="name" />
        <label>Age</label> <input type="number" name="age" />
        <label>Address</label> <input type="text" name="address" />
        <label>City</label> <input type="text" name="city" />
        <label>Pin</label> <input type="number" name="pin" />

        <button type="submit">Create Student</button>
      </form>

      <div class="search-link">
        <a href="/studentinfo/displaysearch/">Search Student Record</a>
      </div>
    </div>
  </body>
</html>
