<!DOCTYPE html>

<html>
  <head>
    <title>Student Created</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f5f9;
        margin: 0;
      }

      /* Header */
      .header {
        background: #d9dee3;
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        color: #2c3e50;
      }

      /* Success Box */
      .success-container {
        width: 500px;
        margin: 80px auto;
        background: white;
        padding: 40px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      /* Success text */
      .success-message {
        color: green;
        font-size: 20px;
        margin-bottom: 20px;
      }

      /* Student ID highlight */
      .student-id {
        font-weight: bold;
        color: #2c3e50;
      }

      /* Buttons */
      .button {
        display: inline-block;
        margin: 10px;
        padding: 10px 20px;
        background: #3b8ec2;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-size: 16px;
      }

      .button:hover {
        background: #2f79a6;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Student Management System</h1>
    </div>

    <div class="success-container">
      <div class="success-message">Student record created successfully!</div>
      <p>Student ID is: <span class="student-id">{{sid}}</span></p>
      <a class="button" href="/studentinfo/displaycreate/">Create Student Record</a>
      <a class="button" href="/studentinfo/displaysearch/">Search Student Record</a>
    </div>
  </body>
</html>
