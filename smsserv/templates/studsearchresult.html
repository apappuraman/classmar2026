<!DOCTYPE html>

<html>
  <head>
    <title>Search Result</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f5f9;
        margin: 0;
      }

      /* Header */
      .header {
        background: #d9dee3;
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        color: #2c3e50;
      }

      /* Result container */
      .result-container {
        width: 600px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      /* Table */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #3b8ec2;
        color: white;
        padding: 10px;
      }

      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      tr:hover {
        background: #f2f2f2;
      }

      /* Links */
      .links {
        margin-top: 20px;
        text-align: center;
      }

      .links a {
        text-decoration: none;
        color: #3b8ec2;
        font-weight: bold;
        margin: 10px;
      }

      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Student Search Result</h1>
    </div>

    <div class="result-container">
      <table>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Address</th>
          <th>City</th>
          <th>Pin</th>
        </tr>

        {% for row in rows %}
        <tr>
          <td>{{row[1]}}</td>
          <td>{{row[2]}}</td>
          <td>{{row[3]}}</td>
          <td>{{row[4]}}</td>
          <td>{{row[5]}}</td>
        </tr>
        {% endfor %}
      </table>

      <div class="links">
        <a href="/studentinfo/displaycreate/">Create Student Record</a> | 
        <a href="/studentinfo/displaysearch/">Search Student Record</a>
      </div>
    </div>
  </body>
</html>
